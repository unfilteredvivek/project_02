name: Auto Deploy with Rollback

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔥 BUILD IMAGE WITH UNIQUE VERSION
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      # 🔥 PUSH IMAGE
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

      # 🔥 FIX SSH KEY FORMAT
      - name: Fix SSH key format
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      # 🔥 DEPLOY TO EC2 (ONLY ONE BLOCK)
      - name: Deploy to EC2 (direct SSH)
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
           docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
           docker rm -f $(docker ps -aq) || true
          docker run -d -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
          EOF